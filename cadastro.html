<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colonial Veículos - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <h1>Cadastro de Veículos</h1>
        <p>Preencha os dados do veículo que deseja cadastrar.</p>
        <form action="salvar_veiculo.php" method="post">
            <label for="placa">Placa: </label>
            <input type="text" id="placa" name="placa" placeholder="ABC-1234" required><br>
            <label for="marca">Marca: </label>
            <input type="text" id="marca" name="marca" placeholder="Ex.: Toyota" required><br>
            <label for="modelo">Modelo: </label>
            <input type="text" id="modelo" name="modelo" placeholder="Ex.: Corolla" required><br>
            <label for="ano_fab">Ano de Fabricação: </label>
            <input type="number" id="ano_fab" name="ano_fab" placeholder="Ex.: 2020" required><br>
            <label for="ano_mod">Ano do Modelo: </label>
            <input type="number" id="ano_mod" name="ano_mod" placeholder="Ex.: 2021" required><br>
            <label for="cor">Cor: </label>
            <input type="text" id="cor" name="cor" placeholder="Ex.: Prata" required><br>
            <label for="combustivel">Combustível: </label>
            <input type="text" id="combustivel" name="combustivel" placeholder="Ex.: Gasolina" required><br>
            <label for="km">Quilometragem: </label>
            <input type="number" id="km" name="km" placeholder="Ex.: 50000" required><br>
            <label for="chassi">Chassi: </label>
            <input type="text" id="chassi" name="chassi" placeholder="Ex.: 1HGBH41JXMN109186" required><br>
            <label for="renavam">Renavam: </label>
            <input type="text" id="renavam" name="renavam" placeholder="Ex.: 12345678901" required><br>
            <label for="data">Data de Cadastro: </label>
            <input type="date" name="cadastro" id="cadastro" required><br>
            <label for="observacoes">Observações: </label>
            <textarea id="observacoes" name="observacoes" rows="4" placeholder="Ex.: Veículo em bom estado"></textarea>
            <input type="submit" value="Cadastrar">
            <button type="button" onclick="window.location.href='index.html'">Voltar</button>
        </form>
    </section>
</body>
</html>
